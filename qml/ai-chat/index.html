<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexFile AI</title>
<script>
(function(){
  var theme = 'dark';
  if (window.location && window.location.search) {
    var m = window.location.search.match(/[?&]theme=([^&]+)/);
    if (m) theme = m[1];
  }
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dark"] {
    --bg: #0a0c10;
    --surface: #10141c;
    --panel: #141820;
    --border: #1e2430;
    --accent: #4af0b4;
    --accent2: #7b6ff0;
    --accent3: #f07b6f;
    --accent4: #f0c46f;
    --text: #c8d4e8;
    --muted: #4a5568;
    --bright: #e8f0ff;
  }
  [data-theme="light"] {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --panel: #eef0f4;
    --border: #d1d5db;
    --accent: #0d9488;
    --accent2: #6366f1;
    --accent3: #dc2626;
    --accent4: #d97706;
    --text: #374151;
    --muted: #6b7280;
    --bright: #111827;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--surface);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .ai-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .ai-title-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }
  .ai-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .ai-name { font-size: 13px; font-weight: 700; color: var(--bright); }
  .ai-model-trigger {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--muted);
    margin-left: auto; padding: 4px 8px;
    border-radius: 6px;
    background: rgba(74,240,180,0.08);
    border: 1px solid rgba(74,240,180,0.2);
    cursor: pointer; display: flex; align-items: center; gap: 4px;
    transition: all 0.15s ease;
  }
  .ai-model-trigger:hover {
    background: rgba(74,240,180,0.12);
    border-color: rgba(74,240,180,0.35);
    color: var(--accent);
  }
  .ai-model-trigger .arrow { font-size: 8px; opacity: 0.8; }
  .ai-model-popover {
    position: absolute; top: 100%; right: 0;
    margin-top: 6px; min-width: 160px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    padding: 6px; z-index: 1000; display: none;
  }
  .ai-model-popover.open { display: block; animation: popFade 0.15s ease; }
  @keyframes popFade {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .ai-model-option {
    padding: 8px 12px; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text); cursor: pointer; transition: background 0.12s;
  }
  .ai-model-option:hover { background: rgba(74,240,180,0.1); color: var(--accent); }
  .ai-model-option.selected { background: rgba(74,240,180,0.15); color: var(--accent); }
  .ai-model-option.selected::after { content: ' ✓'; font-weight: 600; }
  .ai-status-row { display: flex; align-items: center; gap: 6px; }
  .ai-status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 4px var(--accent);
  }
  .ai-status-dot.thinking {
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .ai-status-text {
    font-size: 10px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .ai-context-badge {
    margin-left: auto; font-size: 9px; padding: 1px 6px;
    background: rgba(74,240,180,0.1);
    border: 1px solid rgba(74,240,180,0.2);
    border-radius: 4px; color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .ai-messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .ai-messages::-webkit-scrollbar { width: 10px; }
  .ai-messages::-webkit-scrollbar-track { background: transparent; }
  .ai-messages::-webkit-scrollbar-thumb {
    background: rgba(30, 36, 48, 0.6); border-radius: 5px;
  }
  .ai-messages::-webkit-scrollbar-thumb:hover { background: rgba(30, 36, 48, 0.9); }
  [data-theme="light"] .ai-messages::-webkit-scrollbar-thumb { background: rgba(209, 213, 219, 0.6); }
  [data-theme="light"] .ai-messages::-webkit-scrollbar-thumb:hover { background: rgba(209, 213, 219, 0.9); }

  .msg { display: flex; flex-direction: column; gap: 6px; animation: msgFadeIn 0.25s ease-out; }
  @keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--muted); text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .msg-bubble {
    padding: 12px 14px; border-radius: 12px;
    font-size: 13px; line-height: 1.65;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    word-wrap: break-word; white-space: pre-wrap;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(123,111,240,0.18), rgba(123,111,240,0.08));
    border: 1px solid rgba(123,111,240,0.3);
    color: var(--text); align-self: flex-end; max-width: 88%;
    border-radius: 12px 12px 4px 12px;
  }
  .msg.ai .msg-bubble {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); max-width: 100%;
    border-radius: 12px 12px 12px 4px;
  }
  .msg.error .msg-bubble {
    background: rgba(240,123,111,0.12);
    border: 1px solid rgba(240,123,111,0.3);
    color: var(--accent3); max-width: 100%;
    border-radius: 12px;
  }
  .msg-code {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: rgba(0,0,0,0.15); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; margin-top: 8px;
    color: var(--accent); line-height: 1.6;
  }
  [data-theme="light"] .msg-code { background: rgba(0,0,0,0.04); }
  .msg-result-card {
    background: rgba(0,0,0,0.08); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; margin-top: 8px;
  }
  [data-theme="light"] .msg-result-card { background: rgba(0,0,0,0.03); }
  .mrc-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; padding: 2px 0;
  }
  .mrc-label { color: var(--muted); }
  .mrc-val { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .mrc-val.red { color: var(--accent3); }
  .mrc-val.yellow { color: var(--accent4); }

  .thinking-indicator {
    display: flex; align-items: center; gap: 8px; padding: 12px 14px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px 12px 12px 4px; max-width: 200px;
  }
  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: dotBounce 1.4s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .thinking-text {
    font-size: 11px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .ai-tools {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
  }
  .ai-tools:empty { display: none; padding: 0; border: none; }
  .tool-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--muted); padding: 2px 0;
  }
  .tool-active { color: var(--accent); }
  .tool-spinner {
    width: 8px; height: 8px;
    border: 1px solid rgba(74,240,180,0.3);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-check { color: var(--accent); }
  .tool-error { color: var(--accent3); }

  .ai-input-wrap {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .ai-input-box {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 18px;
    font-size: 14px; font-family: 'Syne', sans-serif;
    color: var(--bright); display: flex; align-items: flex-end; gap: 12px;
    min-height: 80px; cursor: text;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .ai-input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,240,180,0.15);
  }
  .ai-input-box.disabled {
    opacity: 0.6; pointer-events: none;
  }
  .ai-input-area {
    flex: 1; min-height: 48px; outline: none; resize: none;
    border: none; background: transparent;
    font-family: inherit; font-size: 14px;
    color: var(--bright); line-height: 1.6;
  }
  .ai-input-area::placeholder { color: var(--muted); }
  .ai-send-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; align-self: flex-end;
    color: white; border: none;
    transition: transform 0.15s, opacity 0.2s;
  }
  .ai-send-btn svg { width: 18px; height: 18px; }
  .ai-send-btn:hover { opacity: 0.95; transform: scale(1.02); }
  .ai-send-btn:active { transform: scale(0.98); }
  .ai-send-btn:disabled { opacity: 0.4; pointer-events: none; }

  .welcome-msg {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; padding: 40px 20px;
    text-align: center; flex: 1;
  }
  .welcome-icon {
    font-size: 32px; width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
  }
  .welcome-title { font-size: 16px; font-weight: 700; color: var(--bright); }
  .welcome-desc { font-size: 12px; color: var(--muted); line-height: 1.6; max-width: 280px; }
  .welcome-suggestions {
    display: flex; flex-direction: column; gap: 8px; margin-top: 8px; width: 100%; max-width: 300px;
  }
  .suggestion-btn {
    padding: 10px 14px; border-radius: 10px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; cursor: pointer;
    text-align: left; transition: all 0.15s; font-family: 'Syne', sans-serif;
  }
  .suggestion-btn:hover {
    border-color: rgba(74,240,180,0.4);
    background: rgba(74,240,180,0.06);
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="ai-header">
    <div class="ai-title-row">
      <div class="ai-avatar">✦</div>
      <span class="ai-name">NexFile AI</span>
      <div class="ai-model-wrap" style="position:relative; margin-left:auto;">
        <div class="ai-model-trigger" id="modelTrigger" title="点击切换模型">
          <span id="modelDisplay">claude-sonnet</span>
          <span class="arrow">▾</span>
        </div>
        <div class="ai-model-popover" id="modelPopover">
          <div class="ai-model-option" data-model="claude-sonnet-4-20250514">claude-sonnet-4</div>
          <div class="ai-model-option" data-model="claude-sonnet">claude-sonnet</div>
          <div class="ai-model-option" data-model="claude-opus-4">claude-opus-4</div>
          <div class="ai-model-option" data-model="claude-3-5-haiku">claude-3-5-haiku</div>
          <div class="ai-model-option" data-model="gpt-4o">gpt-4o</div>
          <div class="ai-model-option" data-model="gpt-4o-mini">gpt-4o-mini</div>
        </div>
      </div>
    </div>
    <div class="ai-status-row">
      <div class="ai-status-dot" id="statusDot"></div>
      <span class="ai-status-text" id="statusText">就绪</span>
      <span class="ai-context-badge" id="contextBadge" style="display:none"></span>
    </div>
  </div>

  <div class="ai-messages" id="messagesContainer">
    <div class="welcome-msg" id="welcomeMessage">
      <div class="welcome-icon">✦</div>
      <div class="welcome-title">NexFile AI 助手</div>
      <div class="welcome-desc">我可以帮你搜索文件、分析磁盘空间、清理无用文件。试试输入自然语言指令吧！</div>
      <div class="welcome-suggestions">
        <button class="suggestion-btn" data-text="帮我找出 6 个月内没有访问过的大视频文件，给清理建议">🔍 查找长期未访问的大文件</button>
        <button class="suggestion-btn" data-text="分析一下我的磁盘空间使用情况">📊 分析磁盘空间占用</button>
        <button class="suggestion-btn" data-text="搜索所有 .log 文件">📄 搜索日志文件</button>
        <button class="suggestion-btn" data-text="帮我查找主目录下的重复文件">🔁 查找重复文件</button>
      </div>
    </div>
  </div>

  <div class="ai-tools" id="toolsContainer"></div>

  <div class="ai-input-wrap">
    <div class="ai-input-box" id="inputBox">
      <textarea class="ai-input-area" id="inputArea" placeholder="输入指令，例如：找出重复文件…" rows="1"></textarea>
      <button class="ai-send-btn" id="sendBtn" type="button" title="发送">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m22 2-7 20-4-9-9-4Z"/>
          <path d="M22 2 11 13"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    var chatBridge = null;
    var isThinking = false;
    var hasMessages = false;
    var toolRows = {};

    if (typeof qt !== 'undefined' && qt.webChannelTransport) {
      new QWebChannel(qt.webChannelTransport, function(channel) {
        chatBridge = channel.objects.chatBridge;
        if (chatBridge) {
          chatBridge.pushAiMessage.connect(function(text) {
            removeThinkingIndicator();
            addAiMessageToUI(text);
            setInputEnabled(true);
          });
          chatBridge.pushStreamChunk.connect(function(chunk) {
            appendStreamChunk(chunk);
          });
          chatBridge.pushToolStatus.connect(function(name, status, detail) {
            updateToolStatus(name, status, detail);
          });
          chatBridge.pushError.connect(function(error) {
            removeThinkingIndicator();
            addErrorMessageToUI(error);
            setInputEnabled(true);
          });
          chatBridge.pushClear.connect(function() {
            clearAllMessages();
          });
          chatBridge.pushContextInfo.connect(function(info) {
            var badge = document.getElementById('contextBadge');
            if (badge) {
              badge.textContent = info;
              badge.style.display = info ? 'inline' : 'none';
            }
          });
          chatBridge.pushModelName.connect(function(model) {
            var display = document.getElementById('modelDisplay');
            if (display) display.textContent = model;
          });
          chatBridge.aiThinkingChanged.connect(function() {
            if (chatBridge.aiThinking) {
              showThinkingIndicator();
            } else {
              removeThinkingIndicator();
            }
          });
        }
      });
    }

    // model selector
    (function() {
      var STORAGE_KEY = 'nexfile_ai_model';
      var MODELS = ['claude-sonnet-4-20250514','claude-sonnet','claude-opus-4','claude-3-5-haiku','gpt-4o','gpt-4o-mini'];
      var DISPLAY_NAMES = {'claude-sonnet-4-20250514':'claude-sonnet-4','claude-sonnet':'claude-sonnet','claude-opus-4':'claude-opus-4','claude-3-5-haiku':'claude-3-5-haiku','gpt-4o':'gpt-4o','gpt-4o-mini':'gpt-4o-mini'};
      function getStored() { try { return localStorage.getItem(STORAGE_KEY) || 'claude-sonnet'; } catch(e) { return 'claude-sonnet'; } }
      function setStored(v) { try { localStorage.setItem(STORAGE_KEY, v); } catch(e) {} }
      var trigger = document.getElementById('modelTrigger');
      var popover = document.getElementById('modelPopover');
      var display = document.getElementById('modelDisplay');
      if (!trigger || !popover || !display) return;
      function updateUI() {
        var m = getStored();
        display.textContent = DISPLAY_NAMES[m] || m;
        document.querySelectorAll('.ai-model-option').forEach(function(el) {
          el.classList.toggle('selected', el.dataset.model === m);
        });
      }
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        popover.classList.toggle('open');
      });
      document.addEventListener('click', function() { popover.classList.remove('open'); });
      popover.addEventListener('click', function(e) { e.stopPropagation(); });
      popover.querySelectorAll('.ai-model-option').forEach(function(el) {
        el.addEventListener('click', function() {
          var m = this.dataset.model;
          setStored(m);
          updateUI();
          popover.classList.remove('open');
          if (chatBridge && typeof chatBridge.setModelName === 'function')
            chatBridge.setModelName(m);
        });
      });
      updateUI();
    })();

    // suggestion buttons
    document.querySelectorAll('.suggestion-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var text = this.dataset.text;
        if (text) sendMessage(text);
      });
    });

    var textarea = document.getElementById('inputArea');
    var sendBtn = document.getElementById('sendBtn');

    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    });

    textarea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    sendBtn.addEventListener('click', function() {
      var text = textarea.value.trim();
      if (text && !isThinking) sendMessage(text);
    });

    function sendMessage(text) {
      hideWelcome();
      addUserMessageToUI(text);
      setInputEnabled(false);
      showThinkingIndicator();
      setStatus('thinking', 'AI 思考中...');

      textarea.value = '';
      textarea.style.height = 'auto';

      if (chatBridge && typeof chatBridge.addUserMessage === 'function') {
        chatBridge.addUserMessage(text);
      }
    }

    function hideWelcome() {
      var el = document.getElementById('welcomeMessage');
      if (el) el.remove();
    }

    function addUserMessageToUI(text) {
      hasMessages = true;
      var container = document.getElementById('messagesContainer');
      var div = document.createElement('div');
      div.className = 'msg user';
      div.innerHTML = '<div class="msg-label" style="text-align:right">你</div>' +
        '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
      container.appendChild(div);
      scrollToBottom();
    }

    function addAiMessageToUI(text) {
      hasMessages = true;
      var container = document.getElementById('messagesContainer');
      var div = document.createElement('div');
      div.className = 'msg ai';
      div.innerHTML = '<div class="msg-label">✦ NexFile AI</div>' +
        '<div class="msg-bubble">' + formatAiText(text) + '</div>';
      container.appendChild(div);
      setStatus('ready', '就绪');
      scrollToBottom();
    }

    function addErrorMessageToUI(error) {
      var container = document.getElementById('messagesContainer');
      var div = document.createElement('div');
      div.className = 'msg error';
      div.innerHTML = '<div class="msg-label">⚠ 错误</div>' +
        '<div class="msg-bubble">' + escapeHtml(error) + '</div>';
      container.appendChild(div);
      setStatus('error', '发生错误');
      scrollToBottom();
    }

    function showThinkingIndicator() {
      isThinking = true;
      removeThinkingIndicator();
      var container = document.getElementById('messagesContainer');
      var div = document.createElement('div');
      div.id = 'thinkingIndicator';
      div.className = 'msg ai';
      div.innerHTML = '<div class="msg-label">✦ NexFile AI</div>' +
        '<div class="thinking-indicator">' +
        '<div class="thinking-dots"><span></span><span></span><span></span></div>' +
        '<span class="thinking-text">思考中</span></div>';
      container.appendChild(div);
      scrollToBottom();
    }

    function removeThinkingIndicator() {
      isThinking = false;
      var el = document.getElementById('thinkingIndicator');
      if (el) el.remove();
    }

    var currentStreamDiv = null;
    function appendStreamChunk(chunk) {
      if (!currentStreamDiv) {
        hideWelcome();
        removeThinkingIndicator();
        var container = document.getElementById('messagesContainer');
        currentStreamDiv = document.createElement('div');
        currentStreamDiv.className = 'msg ai';
        currentStreamDiv.innerHTML = '<div class="msg-label">✦ NexFile AI</div>' +
          '<div class="msg-bubble" id="streamBubble"></div>';
        container.appendChild(currentStreamDiv);
      }
      var bubble = currentStreamDiv.querySelector('#streamBubble');
      if (bubble) {
        bubble.innerHTML += escapeHtml(chunk);
      }
      scrollToBottom();
    }

    function updateToolStatus(name, status, detail) {
      var container = document.getElementById('toolsContainer');
      var rowId = 'tool-' + name.replace(/[^a-zA-Z0-9_]/g, '_');

      if (status === 'running') {
        setStatus('thinking', '工具执行中: ' + name);
        var row = document.getElementById(rowId);
        if (!row) {
          row = document.createElement('div');
          row.id = rowId;
          row.className = 'tool-row tool-active';
          container.insertBefore(row, container.firstChild);
        }
        row.className = 'tool-row tool-active';
        row.innerHTML = '<div class="tool-spinner"></div> ' + escapeHtml(name) + ' · ' + escapeHtml(detail);
      } else if (status === 'done') {
        var row = document.getElementById(rowId);
        if (row) {
          row.className = 'tool-row';
          row.innerHTML = '<span class="tool-check">✓</span> ' + escapeHtml(name) + ' · ' + escapeHtml(detail);
        } else {
          row = document.createElement('div');
          row.id = rowId;
          row.className = 'tool-row';
          row.innerHTML = '<span class="tool-check">✓</span> ' + escapeHtml(name) + ' · ' + escapeHtml(detail);
          container.appendChild(row);
        }
      } else if (status === 'error') {
        var row = document.getElementById(rowId);
        if (!row) {
          row = document.createElement('div');
          row.id = rowId;
          container.appendChild(row);
        }
        row.className = 'tool-row';
        row.innerHTML = '<span class="tool-error">✗</span> ' + escapeHtml(name) + ' · ' + escapeHtml(detail);
      }
    }

    function clearAllMessages() {
      var container = document.getElementById('messagesContainer');
      container.innerHTML = '';
      document.getElementById('toolsContainer').innerHTML = '';
      currentStreamDiv = null;
      hasMessages = false;
    }

    function setInputEnabled(enabled) {
      var box = document.getElementById('inputBox');
      var btn = document.getElementById('sendBtn');
      var area = document.getElementById('inputArea');
      if (enabled) {
        box.classList.remove('disabled');
        btn.disabled = false;
        area.disabled = false;
        area.focus();
      } else {
        box.classList.add('disabled');
        btn.disabled = true;
        area.disabled = true;
      }
    }

    function setStatus(state, text) {
      var dot = document.getElementById('statusDot');
      var txt = document.getElementById('statusText');
      if (txt) txt.textContent = text;
      if (dot) {
        dot.classList.remove('thinking');
        if (state === 'thinking') dot.classList.add('thinking');
      }
    }

    function scrollToBottom() {
      var container = document.getElementById('messagesContainer');
      setTimeout(function() {
        container.scrollTop = container.scrollHeight;
      }, 50);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
    }

    function formatAiText(text) {
      if (!text) return '';
      var escaped = escapeHtml(text);
      escaped = escaped.replace(/`([^`]+)`/g, '<code style="color:var(--accent);font-family:JetBrains Mono,monospace;font-size:11px;background:rgba(0,0,0,0.1);padding:1px 4px;border-radius:3px">$1</code>');
      return escaped;
    }
  </script>
</body>
</html>
